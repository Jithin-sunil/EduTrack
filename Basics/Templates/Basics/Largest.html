{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Largest of Three | EduTrack-X Basics</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="landing-nav">
        <div class="sidebar-logo">
            <span>EduTrack-X Basics</span>
        </div>
        <div>
            <a href="{% url 'Guest:index' %}" class="btn btn-secondary">Back to Main Home</a>
        </div>
    </div>
    
    <div class="landing-container" style="max-width: 600px; margin-top: 50px;">
        <div class="glass-card animate-fade-in">
            <h2 style="margin-bottom: 20px; text-align: center; background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Find Largest of Three Numbers</h2>
            
            <form action="" method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label class="form-label" for="txt_num1">Number 1</label>
                    <input class="form-control" type="number" name="txt_num1" id="txt_num1" required placeholder="Enter first number">
                </div>
                <div class="form-group">
                    <label class="form-label" for="txt_num2">Number 2</label>
                    <input class="form-control" type="number" name="txt_num2" id="txt_num2" required placeholder="Enter second number">
                </div>
                <div class="form-group">
                    <label class="form-label" for="txt_num3">Number 3</label>
                    <input class="form-control" type="number" name="txt_num3" id="txt_num3" required placeholder="Enter third number">
                </div>
                <div style="text-align: center; margin-top: 30px;">
                    <button class="btn btn-primary" type="submit" style="width: 100%;">Find Largest</button>
                </div>
            </form>
            
            {% if Result is not None %}
            <div class="glass-card" style="margin-top: 30px; border-color: var(--accent); background: rgba(168, 85, 247, 0.05); text-align: center;">
                <h3 style="color: var(--text-muted); font-size: 15px; text-transform: uppercase;">Largest Number</h3>
                <p style="font-size: 32px; font-weight: 700; color: #ffffff; font-family: var(--font-outfit); margin-top: 10px;">{{ Result }}</p>
            </div>
            {% endif %}
            
            <div style="display: flex; justify-content: space-between; margin-top: 30px; font-size: 14px;">
                <a href="{% url 'Basics:Sum' %}">Sum</a>
                <a href="{% url 'Basics:Calculator' %}">Calculator</a>
                <a href="{% url 'Basics:Ranklist' %}">Ranklist</a>
                <a href="{% url 'Basics:Salarycalculation' %}">Salary Calculation</a>
            </div>
        </div>
    </div>
</body>
</html>
