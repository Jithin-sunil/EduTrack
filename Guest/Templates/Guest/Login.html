{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | EduTrack-X</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="landing-nav">
        <div class="sidebar-logo">
            <span>EduTrack-X</span>
        </div>
        <div>
            <a href="{% url 'Guest:index' %}" class="btn btn-secondary">Home</a>
        </div>
    </div>
    
    <div class="landing-container" style="max-width: 480px; margin-top: 60px;">
        <div class="glass-card animate-fade-in" style="padding: 40px 30px;">
            <h2 style="text-align: center; margin-bottom: 10px; font-size: 28px;">Welcome Back</h2>
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 30px; font-size: 14px;">Sign in to access your dashboard</p>
            
            {% if error %}
            <div style="background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); border-radius: 8px; padding: 12px; margin-bottom: 20px; font-size: 14px; color: #f87171; text-align: center;">
                {{ error }}
            </div>
            {% endif %}
            
            {% if msg %}
            <div style="background: rgba(16, 185, 129, 0.1); border: 1px solid var(--success); border-radius: 8px; padding: 12px; margin-bottom: 20px; font-size: 14px; color: #34d399; text-align: center;">
                {{ msg }}
            </div>
            {% endif %}
            
            <form action="" method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label class="form-label" for="txt_email">Email Address</label>
                    <input class="form-control" type="email" name="txt_email" id="txt_email" required placeholder="name@college.edu">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="txt_password">Password</label>
                    <input class="form-control" type="password" name="txt_password" id="txt_password" required placeholder="••••••••">
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px; padding: 14px;">Sign In</button>
            </form>
            
            <div style="margin-top: 30px; text-align: center; font-size: 14px; color: var(--text-muted);">
                Don't have an account? <br>
                <div style="margin-top: 10px; display: flex; justify-content: center; gap: 15px;">
                    <a href="{% url 'Guest:StudentRegister' %}">Student</a> • 
                    <a href="{% url 'Guest:FacultyRegister' %}">Faculty</a> • 
                    <a href="{% url 'Guest:CompanyRegister' %}">Company</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
