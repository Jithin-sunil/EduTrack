{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration | EduTrack-X</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="landing-nav">
        <div class="sidebar-logo">
            <span>EduTrack-X</span>
        </div>
        <div>
            <a href="{% url 'Guest:index' %}" class="btn btn-secondary">Home</a>
        </div>
    </div>
    
    <div class="landing-container" style="max-width: 700px; margin-top: 40px; margin-bottom: 60px;">
        <div class="glass-card animate-fade-in" style="padding: 40px 30px;">
            <h2 style="text-align: center; margin-bottom: 10px; font-size: 28px;">Student Enrollment</h2>
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 30px; font-size: 14px;">Create your profile to start tracking your academic activities</p>
            
            {% if error %}
            <div style="background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); border-radius: 8px; padding: 12px; margin-bottom: 20px; font-size: 14px; color: #f87171; text-align: center;">
                {{ error }}
            </div>
            {% endif %}
            
            <form action="" method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label class="form-label" for="txt_name">Full Name</label>
                        <input class="form-control" type="text" name="txt_name" id="txt_name" required placeholder="Akhil">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="txt_admissionno">Admission Number</label>
                        <input class="form-control" type="text" name="txt_admissionno" id="txt_admissionno" required placeholder="e.g. ADM2026BCA05">
                    </div>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-top: 10px;">
                    <div class="form-group">
                        <label class="form-label">Gender</label>
                        <div style="display: flex; gap: 15px; margin-top: 10px;">
                            <label><input type="radio" name="gender" value="Male" checked> Male</label>
                            <label><input type="radio" name="gender" value="Female"> Female</label>
                            <label><input type="radio" name="gender" value="Other"> Other</label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="dob">Date of Birth</label>
                        <input class="form-control" type="date" name="dob" id="dob" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="sel_programme">Degree Programme</label>
                        <select name="sel_programme" id="sel_programme" required>
                            <option value="">-- Choose Program --</option>
                            {% for prog in programmes %}
                            <option value="{{ prog.programme_id }}">{{ prog.programme_name }} ({{ prog.department.department_name }})</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 10px;">
                    <div class="form-group">
                        <label class="form-label" for="txt_email">Email Address</label>
                        <input class="form-control" type="email" name="txt_email" id="txt_email" required placeholder="akhil@college.edu">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="txt_contact">Contact Phone</label>
                        <input class="form-control" type="text" name="txt_contact" id="txt_contact" required placeholder="e.g. 9876543210">
                    </div>
                </div>
                
                <div class="form-group" style="margin-top: 10px;">
                    <label class="form-label" for="txt_address">Permanent Address</label>
                    <textarea name="txt_address" id="txt_address" rows="3" required placeholder="Street, City, State, ZIP"></textarea>
                </div>
                
                <div class="form-group" style="margin-top: 10px;">
                    <label class="form-label" for="photo">Upload Profile Photo</label>
                    <input class="form-control" type="file" name="photo" id="photo" accept="image/*">
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 10px;">
                    <div class="form-group">
                        <label class="form-label" for="txt_password">Password</label>
                        <input class="form-control" type="password" name="txt_password" id="txt_password" required placeholder="Create Password">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="txt_confirm_password">Confirm Password</label>
                        <input class="form-control" type="password" name="txt_confirm_password" id="txt_confirm_password" required placeholder="Re-enter Password">
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 25px; padding: 14px;">Register Profile</button>
            </form>
            
            <div style="margin-top: 20px; text-align: center; font-size: 14px; color: var(--text-muted);">
                Already have an account? <a href="{% url 'Guest:Login' %}">Sign In</a>
            </div>
        </div>
    </div>
</body>
</html>
